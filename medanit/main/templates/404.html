<!-- templates/404.html -->
{% extends 'base.html' %}
{% block content %}
<div class="container-fluid d-flex align-items-center justify-content-center min-vh-100" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); position: relative; overflow: hidden;">
  <!-- Floating animal icons -->
  <div class="floating-animals">
    <i class="bi bi-heart-fill animal-icon" style="top: 10%; left: 10%; animation-delay: 0s;"></i>
    <i class="bi bi-activity animal-icon" style="top: 20%; right: 15%; animation-delay: 1s;"></i>
    <i class="bi bi-emoji-smile animal-icon" style="bottom: 15%; left: 20%; animation-delay: 2s;"></i>
    <i class="bi bi-star-fill animal-icon" style="top: 50%; right: 10%; animation-delay: 3s;"></i>
  </div>

  <div class="row justify-content-center w-100">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-lg border-0 rounded-4 animate-bounce-in text-center">
        <div class="card-body py-5">
          <!-- Animated 404 -->
          <h1 class="display-1 text-danger fw-bold mb-3 animate-wiggle">404</h1>
          
          <!-- Fun message -->
          <p class="lead mb-4 text-muted animate-fade-in">
            <i class="bi bi-exclamation-triangle-fill text-warning me-2"></i>
            Ой! Кажется, ваш питомец заблудился в интернете. Давайте вернёмся к нашим хвостатым друзьям!
          </p>
          
          <!-- Animated puppy or cat -->
          <div class="mb-4 animate-bounce">
            <i class="bi bi-house-door-fill text-primary" style="font-size: 4rem;"></i>
            <div class="mt-2">
              <small class="text-secondary">Домой, милый!</small>
            </div>
          </div>
          
          <!-- Button -->
          <a href="{% url 'animal-list' %}" class="btn btn-primary btn-lg shadow btn-hover animate-slide-up">
            <i class="bi bi-arrow-left-circle me-2"></i> На главную
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  .floating-animals {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .animal-icon {
    position: absolute;
    font-size: 2rem;
    color: rgba(255, 255, 255, 0.7);
    animation: float 6s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(10deg); }
  }

  .animate-bounce-in {
    animation: bounceIn 1s ease-out;
  }
  @keyframes bounceIn {
    0% { transform: scale(0.3); opacity: 0; }
    50% { transform: scale(1.05); }
    70% { transform: scale(0.9); }
    100% { transform: scale(1); opacity: 1; }
  }

  .animate-wiggle {
    animation: wiggle 2s infinite;
  }
  @keyframes wiggle {
    0%, 7% { transform: rotateZ(0); }
    15% { transform: rotateZ(-15deg); }
    20% { transform: rotateZ(10deg); }
    25% { transform: rotateZ(-10deg); }
    30% { transform: rotateZ(6deg); }
    35% { transform: rotateZ(-4deg); }
    40%, 100% { transform: rotateZ(0); }
  }

  .animate-fade-in {
    animation: fadeIn 1.5s ease-in;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .animate-bounce {
    animation: bounce 2s infinite;
  }
  @keyframes bounce {
    0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-10px); }
    60% { transform: translateY(-5px); }
  }

  .animate-slide-up {
    animation: slideUp 0.8s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .btn-hover {
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .btn-hover:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 16px rgba(0,0,0,0.3);
  }

  @media (max-width: 768px) {
    .card-body {
      padding: 2rem;
    }
    .display-1 {
      font-size: 5rem;
    }
  }
</style>

<script>
  // Add some interactive fun
  document.addEventListener('DOMContentLoaded', function() {
    const card = document.querySelector('.card');
    card.addEventListener('click', function() {
      this.style.animation = 'none';
      setTimeout(() => {
        this.style.animation = 'bounceIn 0.5s ease-out';
      }, 10);
    });

    // Randomize floating animals positions slightly on load
    const animals = document.querySelectorAll('.animal-icon');
    animals.forEach(animal => {
      const randomX = Math.random() * 20 - 10; // -10 to 10
      const randomY = Math.random() * 20 - 10;
      animal.style.transform += ` translate(${randomX}px, ${randomY}px)`;
    });
  });
</script>
{% endblock %}
